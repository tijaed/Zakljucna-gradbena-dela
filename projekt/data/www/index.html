<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Moja spletna stran</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Moja spletna stran</h1>
    <p>Dobrodošel na moji strani</p>
</header>

<nav>
    <a href="#">Domov</a>
    <a href="#">O meni</a>
    <a href="#">Storitve</a>
    <a href="#">Kontakt</a>
</nav>

<main>
    <div class="card">
        <h2>Naslov vsebine</h2>
        <p>To je primer osnovne vsebine na strani.</p>
    </div>

    <div class="card">
        <h2>Še ena sekcija</h2>
        <p>Tukaj lahko dodaš več informacij.</p>
    </div>
</main>

<footer>
    <p>© 2026 Moja stran</p>
</footer>

</body>
</html>
