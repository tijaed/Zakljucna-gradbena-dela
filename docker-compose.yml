
services:
  spletni-streznik:
    build:
      context: .
      dockerfile_inline: |
        FROM php:apache
        RUN docker-php-ext-install pdo pdo_mysql
        RUN a2enmod rewrite
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:80
    volumes:
      - ./data/www:/var/www/html/

  mysql:
    hostname: podatkovna-baza
    image: mysql:latest
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=superVarnoGeslo
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:80"
    environment:
      PMA_HOST: podatkovna-baza

  node:
    image: node:18
    container_name: node_sass
    working_dir: /app
    volumes:
      - ./data/www:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - SHELL=/bin/sh 
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
  mysql_data:
